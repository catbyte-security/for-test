name: canaryq
on:
  push:
    branches:
      - 'mergify/merge-queue/**'
jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 8
      - env:
          S: ${{ secrets.CANARY_SECRET }}
        run: |
          echo "QUEUE-CANARY ref=${{ github.ref }} actor=${{ github.actor }} secret_len=${#S}"
          echo "EMBARKED-COMMITS:"
          git log -8 --pretty='AUTHOR=%an EMAIL=%ae SUBJECT=%s' | head -8
