name: ci
on:
  workflow_dispatch:
    inputs:
      pr_title: { type: string }
      pr_author: { type: string }
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: capture
        env:
          A: ${{ inputs.pr_author }}
          S: ${{ secrets.CANARY_SECRET }}
        run: echo "author_data: ${{ inputs.pr_title }} (by $A)"
