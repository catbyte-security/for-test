name: ci2
on:
  workflow_dispatch:
    inputs:
      pr_title:
        description: pr title
        required: false
        type: string
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: sink
        env:
          S: ${{ secrets.CANARY_SECRET }}
        run: |
          echo "author_data: ${{ inputs.pr_title }}"
          echo "secret_len=${#S}"
