queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions:
      - "label = zzz-never-merge-blocker"
    batch_size: 1
pull_request_rules:
  - name: autoqueue-test
    conditions:
      - base = main
    actions:
      queue:
        name: default
merge_protections_settings:
  reporting_method: check-runs
